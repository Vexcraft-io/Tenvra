name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities or include sensitive data here.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe reproduction.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Revision or version
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web
        - Coordinator
        - Compute client
        - Verifier
        - Contracts
        - Infrastructure
        - Documentation
    validations:
      required: true

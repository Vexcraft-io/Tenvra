name: Vercel Rollback

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Deployment URL or deployment ID to rollback/promote"
        required: true
        type: string
      action:
        description: "Which Vercel action to run"
        required: true
        default: rollback
        type: choice
        options:
          - rollback
          - promote

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_DEPLOYMENT: ${{ inputs.deployment }}
      VERCEL_ACTION: ${{ inputs.action }}
    steps:
      - name: Run Vercel rollback or promote
        run: |
          if [ "$VERCEL_ACTION" = "rollback" ]; then
            npx vercel rollback "$VERCEL_DEPLOYMENT" --yes --token="$VERCEL_TOKEN"
          else
            npx vercel promote "$VERCEL_DEPLOYMENT" --yes --token="$VERCEL_TOKEN"
          fi

      - name: Publish rollback summary
        run: |
          {
            echo "## Vercel $VERCEL_ACTION"
            echo
            echo "- Deployment: $VERCEL_DEPLOYMENT"
            echo "- Action: $VERCEL_ACTION"
          } >> "$GITHUB_STEP_SUMMARY"

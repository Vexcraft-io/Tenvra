name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript and TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm contracts:validate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  go:
    name: Go compute client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false
      - working-directory: clients/compute
        run: go test ./...

  python:
    name: Python verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./workers/verifier[dev]"
      - run: python -m ruff check workers/verifier
      - run: python -m mypy workers/verifier/src
      - run: python -m pytest workers/verifier/tests

  contracts-and-infrastructure:
    name: Contracts and infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0
      - run: tofu -chdir=infrastructure/opentofu fmt -check
      - run: tofu -chdir=infrastructure/opentofu init -backend=false
      - run: tofu -chdir=infrastructure/opentofu validate
      - uses: docker/setup-buildx-action@v4

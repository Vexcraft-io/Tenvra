version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      development-dependencies:
        dependency-type: development
  - package-ecosystem: gomod
    directory: /clients/compute
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: /workers/verifier
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
